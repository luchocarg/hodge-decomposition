name:                Engine
version:             0.1.0.0
dependencies:
  - base >= 4.7 && < 5
  - containers
  - aeson
  - bytestring

library:
  source-dirs: src

tests:
  Engine-test:
    main:                Spec.hs
    source-dirs:         test
    dependencies:
      - Engine
      - QuickCheck
      - random
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N