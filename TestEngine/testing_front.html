<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Topological Prism - Final Viewer</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #e0e0e0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 300px; background: #1e1e1e; border-right: 1px solid #333; padding: 20px; display: flex; flex-direction: column; z-index: 10; box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
        #main-view { flex-grow: 1; position: relative; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }
        textarea { width: 100%; height: 150px; background: #252526; color: #d4d4d4; border: 1px solid #3e3e42; padding: 10px; font-family: monospace; font-size: 11px; resize: vertical; outline: none; }
        button { background: #007acc; color: white; border: none; padding: 10px; margin-top: 10px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        button:hover { background: #005f9e; }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; font-size: 0.85rem; color: #aaa; }
        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
        /* SVG Styles */
        .node circle { stroke: #fff; stroke-width: 1.5px; cursor: grab; }
        .link { stroke-opacity: 0.8; transition: all 0.3s; }
        .link-gradient { stroke: #aaa; stroke-dasharray: none; } /* Linea Solida = Gradiente */
        .link-rotational { stroke: #ff9800; stroke-dasharray: 4; animation: dash 1s linear infinite; } /* Linea Punteada = Rotacional */
        @keyframes dash { to { stroke-dashoffset: -8; } }
        text { font-size: 10px; fill: #fff; pointer-events: none; text-shadow: 0 1px 2px black; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3 style="color:#4fc3f7; border-bottom: 2px solid #4fc3f7; padding-bottom:5px;">Topological Engine</h3>
        <p style="font-size:0.8rem; opacity:0.7;">Paste output from Engine.exe:</p>
        <textarea id="jsonInput"></textarea>
        <button onclick="render()">Visualize Physics</button>
        
        <div id="stats" style="margin-top:20px; font-size:0.9rem;"></div>

        <div style="margin-top: auto;">
            <div class="legend-item"><span class="dot" style="background:#ff5252;"></span>Source (+Div)</div>
            <div class="legend-item"><span class="dot" style="background:#448aff;"></span>Sink (-Div)</div>
            <div class="legend-item"><span class="dot" style="background:#999;"></span>Gradient Flow (Gravity)</div>
            <div class="legend-item"><span class="dot" style="background:#ff9800;"></span>Rotational Flow (Vortex)</div>
        </div>
    </div>

    <div id="main-view"></div>

    <script>
        const width = document.getElementById('main-view').clientWidth;
        const height = document.getElementById('main-view').clientHeight;
        const svg = d3.select("#main-view").append("svg").attr("width", width).attr("height", height)
                      .call(d3.zoom().on("zoom", (e) => g.attr("transform", e.transform))).append("g");
        const g = svg.append("g");

        // Arrow Marker
        svg.append("defs").append("marker").attr("id", "arrow").attr("viewBox", "0 -5 10 10")
           .attr("refX", 18).attr("refY", 0).attr("markerWidth", 6).attr("markerHeight", 6)
           .attr("orient", "auto").append("path").attr("d", "M0,-5L10,0L0,5").attr("fill", "#888");

        function render() {
            g.selectAll("*").remove();
            try {
                const data = JSON.parse(document.getElementById('jsonInput').value);
                
                // 1. SCALES
                const potentials = data.nodes.map(n => n.potential);
                const yScale = d3.scaleLinear().domain([Math.min(...potentials), Math.max(...potentials)]).range([height-100, 100]);
                const colorScale = d3.scaleLinear().domain([-10, 0, 10]).range(["#448aff", "#9e9e9e", "#ff5252"]); // Blue -> Grey -> Red

                // 2. LINK MAPPING (ID -> Object)
                const nodeMap = new Map(data.nodes.map(n => [n.id, n]));
                const links = data.edges.map(e => ({
                    ...e,
                    source: nodeMap.get(e.source), // Ahora usa los campos 'source' y 'target' del JSON
                    target: nodeMap.get(e.target)
                })).filter(e => e.source && e.target);

                // 3. SIMULATION
                const simulation = d3.forceSimulation(data.nodes)
                    .force("link", d3.forceLink(links).id(d => d.id).distance(100))
                    .force("charge", d3.forceManyBody().strength(-400))
                    .force("y", d3.forceY(d => yScale(d.potential)).strength(0.1)) // Gravity based on Potential
                    .force("x", d3.forceX(width/2).strength(0.1));

                // 4. DRAW LINKS (Arrows)
                const link = g.append("g").selectAll("line")
                    .data(links).enter().append("line")
                    .attr("stroke-width", d => Math.max(1, Math.abs(d.gradient)/2 + Math.abs(d.rotational)/2))
                    .attr("stroke", d => Math.abs(d.rotational) > Math.abs(d.gradient) ? "#ff9800" : "#999") // Naranja si es mayormente rotacional
                    .attr("stroke-dasharray", d => Math.abs(d.rotational) > Math.abs(d.gradient) ? "4" : "0")
                    .attr("marker-end", "url(#arrow)");

                // 5. DRAW NODES
                const node = g.append("g").selectAll("g")
                    .data(data.nodes).enter().append("g")
                    .call(d3.drag().on("start", (e,d)=>{if(!e.active)simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y})
                                   .on("drag", (e,d)=>{d.fx=e.x;d.fy=e.y})
                                   .on("end", (e,d)=>{if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null}));

                node.append("circle").attr("r", 10).attr("fill", d => colorScale(d.divergence));
                node.append("text").attr("dx", 14).attr("dy", 4).text(d => `Z:${d.potential.toFixed(1)}`);

                // 6. UPDATE LOOP
                simulation.on("tick", () => {
                    link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                    node.attr("transform", d => `translate(${d.x},${d.y})`);
                });

                // Stats
                document.getElementById('stats').innerHTML = `Conservative: <strong>${data.isConservative}</strong>`;

            } catch (e) { alert("JSON Error: " + e); console.error(e); }
        }
    </script>
</body>
</html>
